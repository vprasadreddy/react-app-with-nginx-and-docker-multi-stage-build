apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app-with-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-app-with-nginx
  template:
    metadata:
      labels:
        app: react-app-with-nginx
    spec:
      containers:
        - name: react-app-with-nginx-container
          image: prasadreddy2349/react-app-with-nginx:latest # Reference public Docker Hub image here
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
